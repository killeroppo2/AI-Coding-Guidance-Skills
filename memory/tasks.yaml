tasks:
  - id: "T-001"
    title: "项目脚手架与环境配置"
    description: "搭建 FastAPI 项目骨架，安装必要依赖（FastAPI, uvicorn, SQLAlchemy, python-jose, passlib, pytest）"
    status: "done"
    acceptance_criteria:
      - "项目结构完整，main.py 可启动"
      - "所有依赖声明在 requirements.txt 中"
    dependencies: []
    complexity: "low"

  - id: "T-002"
    title: "用户模型与数据库初始化"
    description: "使用 SQLAlchemy 定义 User 数据模型（id, username, email, hashed_password, created_at），初始化 SQLite 数据库连接"
    status: "done"
    acceptance_criteria:
      - "User 模型包含所有必要字段"
      - "数据库启动时自动创建表"
      - "密码字段为哈希值，不存明文"
    dependencies: ["T-001"]
    complexity: "medium"

  - id: "T-003"
    title: "密码哈希与 JWT 工具函数"
    description: "实现密码哈希（passlib bcrypt）和 JWT token 生成/验证（python-jose），包含 access token 和 refresh token 逻辑"
    status: "done"
    acceptance_criteria:
      - "密码哈希可验证"
      - "JWT token 生成和验证正确"
      - "token 包含过期时间"
    dependencies: ["T-001"]
    complexity: "medium"

  - id: "T-004"
    title: "用户注册 API"
    description: "实现 POST /api/register 端点，接收 username, email, password，验证参数并创建用户"
    status: "done"
    acceptance_criteria:
      - "注册成功返回 201 和用户信息（不包含密码）"
      - "重复用户名/邮箱返回 409"
      - "参数校验错误返回 422"
    dependencies: ["T-002", "T-003"]
    complexity: "medium"

  - id: "T-005"
    title: "用户登录 API"
    description: "实现 POST /api/login 端点，验证用户名/密码，返回 JWT access token"
    status: "done"
    acceptance_criteria:
      - "登录成功返回 200 和 JWT token"
      - "错误密码返回 401"
      - "不存在的用户返回 401"
    dependencies: ["T-003", "T-004"]
    complexity: "medium"

  - id: "T-006"
    title: "测试覆盖"
    description: "为注册、登录、token 验证等功能编写 pytest 测试用例，覆盖正常流程和错误分支"
    status: "done"
    acceptance_criteria:
      - "所有测试通过"
      - "覆盖率 > 90%"
      - "包含正常路径和异常路径测试"
    dependencies: ["T-004", "T-005"]
    complexity: "medium"
