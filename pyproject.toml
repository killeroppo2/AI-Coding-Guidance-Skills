[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "ai-coding-guidance-skills"
version = "0.1.0"
description = "Self-evolving AI development kernel"
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0", "fastapi>=0.100", "uvicorn>=0.20", "websockets>=11.0"]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0", "httpx>=0.24"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["slow: marks tests as slow (deselect with '-m \"not slow\"')"]
