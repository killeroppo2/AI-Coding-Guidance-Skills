name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Initialize runtime files
        run: python runner.py --init
      - name: Lint with ruff
        run: ruff check .
      - name: Type check with mypy
        run: mypy kernel/ --ignore-missing-imports
      - name: Run tests
        run: python -m pytest tests/ --cov --cov-fail-under=90 -q
